version: '3.8'

services:
  seaweedfs-master:
    image: chrislusf/seaweedfs:3.84
    container_name: wildlife-mlops-seaweedfs-master
    command: "master -ip=seaweedfs-master -mdir=/data"
    ports:
      - "9333:9333"
    volumes:
      - seaweedfs_master_data:/data
    restart: unless-stopped

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.84
    container_name: wildlife-mlops-seaweedfs-volume
    command: 'volume -mserver="seaweedfs-master:9333" -ip=seaweedfs-volume -dir=/data -max=20'
    ports:
      - "8080:8080"
      - "18080:18080"
    volumes:
      - seaweedfs_volume_data:/data
    depends_on:
      - seaweedfs-master
    restart: unless-stopped

  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.84
    container_name: wildlife-mlops-seaweedfs-filer
    command: 'filer -master="seaweedfs-master:9333"'
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    restart: unless-stopped

  seaweedfs-s3:
    image: chrislusf/seaweedfs:3.84
    container_name: wildlife-mlops-seaweedfs-s3
    command: 's3 -filer="seaweedfs-filer:8888" -ip.bind=0.0.0.0 -port=8333 -config=/etc/seaweedfs/s3-config.json'
    ports:
      - "8333:8333"
    volumes:
      - ./seaweedfs/s3-config.json:/etc/seaweedfs/s3-config.json:ro
    depends_on:
      - seaweedfs-filer
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: wildlife-mlops-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: wildlife-mlops-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    working_dir: /app/backend
    environment:
      - PYTHONPATH=/app/backend
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DB_NAME=wildlife_mlops
      - S3_ENDPOINT=http://seaweedfs-s3:8333
      - S3_ACCESS_KEY=wildlife
      - S3_SECRET_KEY=wildlife-secret
      - S3_BUCKET=wildlife-lake
      - BRONZE_PREFIX=bronze
      - SILVER_PREFIX=silver
      - GOLD_PREFIX=gold
      - BRONZE_WRITE_LOCAL_MIRROR=true
      - SILVER_WRITE_LOCAL_MIRROR=true
      - GOLD_WRITE_LOCAL_MIRROR=true
      - BRONZE_RUN_DVC=false
      - HADOOP_AWS_VERSION=3.3.4
      - AWS_JAVA_SDK_BUNDLE_VERSION=1.12.262
      - SPARK_MASTER=local[1]
      - SPARK_SQL_SHUFFLE_PARTITIONS=1
      - SPARK_DEFAULT_PARALLELISM=1
    depends_on:
      - mongodb
      - seaweedfs-s3
    command: python run_api.py
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: wildlife-mlops-dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    restart: unless-stopped

  pipeline:
    build: ./backend
    container_name: wildlife-mlops-pipeline
    command: python run_pipeline.py
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    working_dir: /app/backend
    environment:
      - PYTHONPATH=/app/backend
      - S3_ENDPOINT=http://seaweedfs-s3:8333
      - S3_ACCESS_KEY=wildlife
      - S3_SECRET_KEY=wildlife-secret
      - S3_BUCKET=wildlife-lake
      - BRONZE_PREFIX=bronze
      - SILVER_PREFIX=silver
      - GOLD_PREFIX=gold
      - BRONZE_WRITE_LOCAL_MIRROR=true
      - SILVER_WRITE_LOCAL_MIRROR=true
      - GOLD_WRITE_LOCAL_MIRROR=true
      - BRONZE_RUN_DVC=false
      - HADOOP_AWS_VERSION=3.3.4
      - AWS_JAVA_SDK_BUNDLE_VERSION=1.12.262
      - SPARK_MASTER=local[1]
      - SPARK_SQL_SHUFFLE_PARTITIONS=1
      - SPARK_DEFAULT_PARALLELISM=1
    depends_on:
      - mongodb
      - seaweedfs-s3
    restart: 'no'

volumes:
  mongodb_data:
  seaweedfs_master_data:
  seaweedfs_volume_data:
