version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: wildlife-mlops-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: wildlife-mlops-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    working_dir: /app/backend
    environment:
      - PYTHONPATH=/app/backend
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DB_NAME=wildlife_mlops
    depends_on:
      - mongodb
    command: python run_api.py
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: wildlife-mlops-dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    restart: unless-stopped

  pipeline:
    build: ./backend
    container_name: wildlife-mlops-pipeline
    command: python run_pipeline.py
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    working_dir: /app/backend
    environment:
      - PYTHONPATH=/app/backend
    depends_on:
      - mongodb
    restart: 'no'

volumes:
  mongodb_data:
